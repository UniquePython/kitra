name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-gfx-dev libsdl2-ttf-dev libsdl2-mixer-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          cmake --install build --prefix dist/cinder
          tar -czf cinder-linux-x86_64.tar.gz -C dist cinder

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: cinder-linux-x86_64.tar.gz
