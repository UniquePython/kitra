name: CI

on: [push, pull_request]

permissions:
  actions: write
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsdl2-dev libsdl2-image-dev \
            libsdl2-gfx-dev libsdl2-ttf-dev libsdl2-mixer-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install sdl2 sdl2_image sdl2_gfx sdl2_ttf sdl2_mixer

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: "a34c873a9717a888f58dc05268dea15592c2f0ff"

      - name: Cache vcpkg packages
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_ROOT }}/installed
          key: vcpkg-${{ runner.os }}-sdl2

      - name: Install SDL2 packages (Windows)
        if: runner.os == 'Windows'
        run: ${{ env.VCPKG_ROOT }}/vcpkg install sdl2 sdl2-image sdl2-gfx sdl2-ttf sdl2-mixer --triplet x64-windows --binarysource=clear

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            ${{ runner.os == 'Windows' && '-DCMAKE_TOOLCHAIN_FILE=${{ env.VCPKG_ROOT }}/scripts/buildsystems/vcpkg.cmake' || '' }}
          cmake --build build
